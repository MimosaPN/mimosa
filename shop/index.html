<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミモザショップ | 出版社 ミモザ</title>
<style>
  :root{
    --ink:#3A4031; --green:#5A6B3B; --mimosa:#E8B84B; --mimosa-soft:#FBF1D6;
    --cream:#FFFDF7; --paper:#FFFFFF; --muted:#8A8A7A; --line:#E7E3D6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;color:var(--ink);background:var(--cream);line-height:1.7;-webkit-font-smoothing:antialiased;}

  header{position:sticky;top:0;z-index:40;background:rgba(255,253,247,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .bar{max-width:1100px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;}
  .brand{text-decoration:none;color:var(--ink);}
  .brand-parent{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:10px;color:var(--muted);letter-spacing:.15em;}
  .brand b{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:20px;letter-spacing:.06em;display:block;}
  .header-right{display:flex;align-items:center;gap:16px;}
  .back-link{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:.05em;}
  .back-link:hover{color:var(--ink);}
  .cart-btn{border:1.5px solid var(--ink);background:transparent;color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:14px;font-weight:700;padding:9px 18px 9px 16px;border-radius:30px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .18s,color .18s;}
  .cart-btn:hover{background:var(--ink);color:#fff;}
  .cart-count{background:var(--mimosa);color:var(--ink);font-size:12px;min-width:20px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;font-weight:800;}

  .hero{max-width:1100px;margin:0 auto;padding:54px 22px 24px;}
  .eyebrow{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:12px;letter-spacing:.28em;color:var(--mimosa);font-weight:700;margin-bottom:14px;}
  .hero h1{font-size:38px;font-weight:700;line-height:1.35;letter-spacing:.02em;}
  .hero p{margin-top:12px;color:var(--green);font-size:14px;max-width:580px;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}

  .tabs{max-width:1100px;margin:0 auto;padding:24px 22px 0;display:flex;gap:0;border-bottom:2px solid var(--line);}
  .tab{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;padding:10px 28px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .18s,border-color .18s;}
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--ink);border-bottom-color:var(--mimosa);}

  .filter{max-width:1100px;margin:0 auto;padding:16px 22px 4px;display:flex;flex-wrap:wrap;gap:9px;align-items:center;}
  .filter .lbl{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:12px;color:var(--muted);margin-right:4px;letter-spacing:.08em;}
  .chip{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:13px;padding:7px 16px;border-radius:30px;border:1px solid var(--line);background:var(--paper);color:var(--ink);cursor:pointer;transition:all .16s;}
  .chip:hover{border-color:var(--mimosa);}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  .grid{max-width:1100px;margin:0 auto;padding:22px 22px 70px;display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s;}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(58,64,49,.10);}
  .thumb{aspect-ratio:3/4;background:var(--mimosa-soft);display:flex;align-items:center;justify-content:center;position:relative;}
  .thumb svg{width:54px;height:54px;opacity:.55}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .brand-tag{position:absolute;top:12px;left:12px;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:700;}
  .tag-shobo{background:rgba(255,253,247,.92);color:#5A6B3B;}
  .tag-mimosado{background:rgba(232,184,75,.18);color:#8a6f20;}
  .body{padding:16px 16px 18px;display:flex;flex-direction:column;flex:1;}
  .cat{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:11px;color:var(--muted);letter-spacing:.1em;}
  .name{font-size:17px;font-weight:700;margin:4px 0 6px;line-height:1.45;}
  .desc{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:12.5px;color:var(--muted);flex:1;}
  .price-row{display:flex;align-items:baseline;justify-content:space-between;margin-top:14px;}
  .price{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-weight:800;font-size:20px;}
  .price small{font-size:12px;font-weight:500;color:var(--muted);}
  .add{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:13px;font-weight:700;background:var(--mimosa);border:none;color:var(--ink);padding:9px 16px;border-radius:24px;cursor:pointer;transition:background .16s;}
  .add:hover{background:#dba933;}
  .soldout .add{background:var(--line);color:var(--muted);cursor:not-allowed;}
  .stock-info{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:11px;color:var(--muted);margin-top:6px;}

  .overlay{position:fixed;inset:0;background:rgba(58,64,49,.4);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:90vw;background:var(--cream);z-index:60;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.12);}
  .drawer.open{transform:translateX(0);}
  .drawer h2{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:18px;padding:22px 22px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);}
  .close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--ink);line-height:1;}
  .items{flex:1;overflow-y:auto;padding:8px 22px;}
  .empty{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:var(--muted);font-size:14px;text-align:center;padding:60px 20px;}
  .ci{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--line);}
  .ci-thumb{width:48px;height:60px;flex:none;background:var(--mimosa-soft);border-radius:6px;display:flex;align-items:center;justify-content:center;}
  .ci-thumb svg{width:24px;height:24px;opacity:.5}
  .ci-info{flex:1;min-width:0;}
  .ci-name{font-size:14px;font-weight:700;line-height:1.4;}
  .ci-seller{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:11px;color:var(--muted);}
  .ci-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .qty{display:flex;align-items:center;border:1px solid var(--line);border-radius:20px;overflow:hidden;}
  .qty button{width:28px;height:28px;border:none;background:var(--paper);cursor:pointer;font-size:15px;color:var(--ink);}
  .qty button:hover{background:var(--mimosa-soft);}
  .qty span{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;min-width:30px;text-align:center;font-size:13px;}
  .ci-price{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-weight:700;font-size:14px;}
  .remove{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;text-decoration:underline;margin-top:4px;}
  .foot{border-top:1px solid var(--line);padding:18px 22px 24px;background:var(--paper);}
  .row{display:flex;justify-content:space-between;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .row.total{font-size:17px;color:var(--ink);font-weight:800;margin:10px 0 4px;}
  .note{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:11px;color:var(--muted);margin-bottom:14px;}
  .checkout-btn{width:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:15px;font-weight:700;background:var(--ink);color:#fff;border:none;padding:15px;border-radius:30px;cursor:pointer;transition:background .18s;}
  .checkout-btn:hover{background:#2c3126;}
  .checkout-btn:disabled{background:var(--line);color:var(--muted);cursor:not-allowed;}

  footer{border-top:1px solid var(--line);padding:30px 22px;text-align:center;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:12px;color:var(--muted);}
  footer a{color:var(--muted);text-decoration:none;margin:0 8px;}
  footer a:hover{color:var(--ink);}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:13px;padding:12px 22px;border-radius:30px;opacity:0;pointer-events:none;transition:all .25s;z-index:70;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:860px){.grid{grid-template-columns:repeat(2,1fr);}.hero h1{font-size:28px;}}
  @media(max-width:560px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="bar">
    <a class="brand" href="/">
      <span class="brand-parent">出版社 ミモザ</span>
      <b>ミモザショップ</b>
    </a>
    <div class="header-right">
      <a class="back-link" href="/">← 出版社 ミモザ</a>
      <button class="cart-btn" onclick="openCart()">
        カート <span class="cart-count" id="cc">0</span>
      </button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="eyebrow">MIMOSA SHOP</div>
  <h1>ミモザの本を、あなたの手に。</h1>
  <p>ミモザ書房・ミモザ堂の書籍をまとめてお買い求めいただけます。<br>カートに入れてまとめてお会計できます。</p>
</section>

<div class="tabs">
  <button class="tab active" id="tab-shobo"    onclick="switchTab('shobo')">ミモザ書房</button>
  <button class="tab"        id="tab-mimosado" onclick="switchTab('mimosado')">ミモザ堂</button>
</div>

<div class="filter" id="filter">
  <span class="lbl" id="filter-lbl">ジャンルで絞る</span>
</div>

<main class="grid" id="grid"></main>

<footer>
  <a href="/shobo/">ミモザ書房</a>
  <a href="/mimosado/">ミモザ堂</a>
  <a href="/">出版社 ミモザ</a>
  <a href="/shop/legal.html">特定商取引法に基づく表記</a>
  © 2026 ミモザパートナーズ合同会社
</footer>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<aside class="drawer" id="drawer" aria-label="カート">
  <h2>カート <button class="close" onclick="closeCart()">&times;</button></h2>
  <div class="items" id="items"></div>
  <div class="foot">
    <div class="row"><span>商品小計</span><span id="subtotal">¥0</span></div>
    <div class="row"><span>送料（まとめ発送）</span><span id="shipfee">—</span></div>
    <div class="row total"><span>合計（税込）</span><span id="total">¥0</span></div>
    <p class="note">送料は最も高い配送方法を1回分として計算します。<br>お支払いはSquareの安全な決済画面で行います。</p>
    <button class="checkout-btn" id="checkout" onclick="checkout()" disabled>レジに進む</button>
  </div>
</aside>
<div class="toast" id="toast"></div>

<script src="cart.js"></script>
<script>
const GAS_URL_SHOP = GAS_URL;

const DEMO = {
  shobo: [
    { id:'sb01', label:'ミモザ書房', name:'夜の縁側で、あなたに会う', cat:'小説', price:1600, stock:10, shipFee:200, shipMethod:'クリックポスト', image:'', desc:'祖母の家に帰省した夏。縁側に現れる老女の幽霊と交わす、静かな夜の対話。' },
    { id:'sb02', label:'ミモザ書房', name:'喫茶店で生きている', cat:'エッセイ', price:1500, stock:0, shipFee:200, shipMethod:'クリックポスト', image:'', desc:'全国の喫茶店を巡った著者が綴る、珈琲と時間と人生についての断章。' },
  ],
  mimosado: [
    { id:'bk01', label:'ミモザ堂', name:'朝の余白', cat:'エッセイ', price:1500, stock:8, shipFee:200, shipMethod:'クリックポスト', image:'', desc:'日々の小さな間（ま）を見つめた、静かな随筆集。' },
    { id:'bk02', label:'ミモザ堂', name:'港の光', cat:'写真集', price:2200, stock:3, shipFee:200, shipMethod:'クリックポスト', image:'', desc:'瀬戸内の港町を巡って撮りためた、朝夕の光の記録。' },
    { id:'gd01', label:'ミモザ堂', name:'和綴じノート（藍）', cat:'文具', price:1800, stock:5, shipFee:700, shipMethod:'宅配便', image:'', desc:'職人が一冊ずつ手で綴じた、藍染め表紙のノート。' },
  ]
};

let PRODUCTS_SHOBO    = [];
let PRODUCTS_MIMOSADO = [];
let activeTab         = 'shobo';
let activeFilter      = 'all';

const bookSvgEl = bookSvg;

// ── ハッシュに応じた初期タブ設定 ──────────────────
(function initTabFromHash() {
  const hash = location.hash.slice(1); // '#shobo' → 'shobo'
  if (hash === 'shobo' || hash === 'mimosado') {
    activeTab = hash;
    document.getElementById('tab-shobo').classList.toggle('active',    hash === 'shobo');
    document.getElementById('tab-mimosado').classList.toggle('active', hash === 'mimosado');
  }
})();

// ── 商品読み込み ──
async function loadProducts() {
  document.getElementById('grid').innerHTML =
    `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;">商品を読み込んでいます…</div>`;
  try {
    const [r1, r2] = await Promise.all([
      fetch(`${GAS_URL_SHOP}?label=${encodeURIComponent('ミモザ書房')}`).then(r => r.json()),
      fetch(`${GAS_URL_SHOP}?label=${encodeURIComponent('ミモザ堂')}`).then(r => r.json())
    ]);
    PRODUCTS_SHOBO    = (r1.ok && r1.products) ? r1.products.map(p => ({...p, label:'ミモザ書房'})) : DEMO.shobo;
    PRODUCTS_MIMOSADO = (r2.ok && r2.products) ? r2.products.map(p => ({...p, label:'ミモザ堂'}))   : DEMO.mimosado;
  } catch {
    PRODUCTS_SHOBO    = DEMO.shobo;
    PRODUCTS_MIMOSADO = DEMO.mimosado;
  }
  buildFilter();
  renderGrid();
  updateCartBadge();
}

// ── タブ切り替え ──
function switchTab(tab) {
  activeTab    = tab;
  activeFilter = 'all';
  document.getElementById('tab-shobo').classList.toggle('active',    tab === 'shobo');
  document.getElementById('tab-mimosado').classList.toggle('active', tab === 'mimosado');
  // URLハッシュを更新（ブラウザ履歴には残さない）
  history.replaceState(null, '', '#' + tab);
  buildFilter();
  renderGrid();
}

// ── フィルター生成 ──
function buildFilter() {
  const products = activeTab === 'shobo' ? PRODUCTS_SHOBO : PRODUCTS_MIMOSADO;
  const lbl      = activeTab === 'shobo' ? 'ジャンルで絞る' : 'カテゴリで絞る';
  const keys     = ['all', ...new Set(products.map(p => p.cat))];
  const f        = document.getElementById('filter');
  document.getElementById('filter-lbl').textContent = lbl;
  f.querySelectorAll('.chip').forEach(c => c.remove());
  keys.forEach(k => {
    const b = document.createElement('button');
    b.className   = 'chip' + (k === activeFilter ? ' active' : '');
    b.textContent = k === 'all' ? 'すべて' : k;
    b.onclick     = () => { activeFilter = k; buildFilter(); renderGrid(); };
    f.appendChild(b);
  });
}

// ── グリッド描画 ──
function renderGrid() {
  const products = activeTab === 'shobo' ? PRODUCTS_SHOBO : PRODUCTS_MIMOSADO;
  const cart     = cartLoad();
  const list     = products.filter(p => activeFilter === 'all' || p.cat === activeFilter);
  const grid     = document.getElementById('grid');

  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;">現在、準備中です。</div>`;
    return;
  }

  const tagCls  = activeTab === 'shobo' ? 'tag-shobo' : 'tag-mimosado';
  const tagText = activeTab === 'shobo' ? 'ミモザ書房' : 'ミモザ堂';

  grid.innerHTML = list.map(p => {
    const sold   = p.stock <= 0;
    const inCart = cart[p.id] ? cart[p.id].q : 0;
    const thumb  = p.image
      ? `<img src="${p.image}" alt="${p.name}">`
      : bookSvgEl;
    return `
      <article class="card${sold ? ' soldout' : ''}">
        <div class="thumb">
          <span class="brand-tag ${tagCls}">${tagText}</span>
          ${thumb}
        </div>
        <div class="body">
          <div class="cat">${p.cat}</div>
          <div class="name">${p.name}</div>
          <div class="desc">${p.desc || ''}</div>
          <div class="price-row">
            <div class="price">${yen(p.price)} <small>税込</small></div>
            <button class="add" ${sold ? 'disabled' : ''} onclick="onAdd('${p.id}')">
              ${sold ? '完売' : 'カートに入れる'}
            </button>
          </div>
          <div class="stock-info">${sold
            ? 'ただいま在庫切れです'
            : `残り ${p.stock - inCart} 点・送料 ${yen(p.shipFee)}（${p.shipMethod}）`
          }</div>
        </div>
      </article>`;
  }).join('');
}

// ── カート追加 ──
function onAdd(productId) {
  const all = [...PRODUCTS_SHOBO, ...PRODUCTS_MIMOSADO];
  const p   = all.find(x => x.id === productId);
  if (!p) return;
  const result = cartAdd(productId, p);
  if (!result.ok) { showToast(result.msg); return; }
  renderGrid();
  renderCartDrawer();
  showToast('カートに追加しました');
}

loadProducts();
</script>
</body>
</html>
