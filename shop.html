<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ミモザ堂 オンラインショップ</title>
<style>
  :root{
    --ink:#3A4031; --green:#5A6B3B; --mimosa:#E8B84B; --mimosa-soft:#FBF1D6;
    --cream:#FFFDF7; --paper:#FFFFFF; --muted:#8A8A7A; --line:#E7E3D6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    color:var(--ink); background:var(--cream); line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  .sans{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}

  /* ---- header ---- */
  header{
    position:sticky; top:0; z-index:40; background:rgba(255,253,247,.92);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
  }
  .bar{max-width:1100px; margin:0 auto; padding:14px 22px; display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:11px; text-decoration:none; color:var(--ink);}
  .mark{width:30px; height:30px; flex:none; object-fit:contain;}
  .brand b{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:20px; letter-spacing:.06em;}
  .brand span{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:11px; color:var(--muted); letter-spacing:.18em; display:block; margin-top:-2px;}
  .cart-btn{
    position:relative; border:1.5px solid var(--ink); background:transparent; color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:14px; font-weight:700;
    padding:9px 18px 9px 16px; border-radius:30px; cursor:pointer; display:flex; align-items:center; gap:8px;
    transition:background .18s,color .18s;
  }
  .cart-btn:hover{background:var(--ink); color:#fff;}
  .cart-count{
    background:var(--mimosa); color:var(--ink); font-size:12px; min-width:20px; height:20px;
    border-radius:10px; display:inline-flex; align-items:center; justify-content:center; padding:0 6px; font-weight:800;
  }

  /* ---- hero ---- */
  .hero{max-width:1100px; margin:0 auto; padding:54px 22px 30px;}
  .eyebrow{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:12px; letter-spacing:.28em; color:var(--mimosa); font-weight:700; margin-bottom:14px;}
  .hero h1{font-size:40px; font-weight:700; line-height:1.35; letter-spacing:.02em;}
  .hero p{margin-top:14px; color:var(--green); font-size:15px; max-width:620px; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;}
  .dots{display:inline-grid; grid-template-columns:repeat(3,1fr); gap:4px; vertical-align:middle; margin-left:4px;}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--mimosa);display:block}

  /* ---- filter ---- */
  .filter{max-width:1100px; margin:0 auto; padding:18px 22px 6px; display:flex; flex-wrap:wrap; gap:9px; align-items:center;}
  .filter .lbl{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:12px; color:var(--muted); margin-right:4px; letter-spacing:.08em;}
  .chip{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:13px; padding:7px 16px; border-radius:30px;
    border:1px solid var(--line); background:var(--paper); color:var(--ink); cursor:pointer; transition:all .16s;
  }
  .chip:hover{border-color:var(--mimosa);}
  .chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  /* ---- grid ---- */
  .grid{max-width:1100px; margin:0 auto; padding:22px 22px 70px; display:grid; grid-template-columns:repeat(3,1fr); gap:24px;}
  .card{background:var(--paper); border:1px solid var(--line); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; transition:transform .18s,box-shadow .18s;}
  .card:hover{transform:translateY(-3px); box-shadow:0 12px 28px rgba(58,64,49,.10);}
  .thumb{aspect-ratio:3/4; background:var(--mimosa-soft); display:flex; align-items:center; justify-content:center; position:relative;}
  .thumb svg{width:54px;height:54px;opacity:.55}
  .seller-tag{position:absolute; top:12px; left:12px; background:rgba(255,253,247,.92); font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:11px; padding:4px 10px; border-radius:20px; color:var(--green); font-weight:700;}
  .body{padding:16px 16px 18px; display:flex; flex-direction:column; flex:1;}
  .cat{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:11px; color:var(--muted); letter-spacing:.1em;}
  .name{font-size:17px; font-weight:700; margin:4px 0 6px; line-height:1.45;}
  .desc{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:12.5px; color:var(--muted); flex:1;}
  .price-row{display:flex; align-items:baseline; justify-content:space-between; margin-top:14px;}
  .price{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-weight:800; font-size:20px;}
  .price small{font-size:12px; font-weight:500; color:var(--muted);}
  .add{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:13px; font-weight:700;
    background:var(--mimosa); border:none; color:var(--ink); padding:9px 16px; border-radius:24px; cursor:pointer; transition:background .16s;
  }
  .add:hover{background:#dba933;}
  .soldout .add{background:var(--line); color:var(--muted); cursor:not-allowed;}
  .stock{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:11px; color:var(--muted); margin-top:6px;}

  /* ---- cart drawer ---- */
  .overlay{position:fixed; inset:0; background:rgba(58,64,49,.4); opacity:0; pointer-events:none; transition:opacity .25s; z-index:50;}
  .overlay.open{opacity:1; pointer-events:auto;}
  .drawer{
    position:fixed; top:0; right:0; height:100%; width:400px; max-width:90vw; background:var(--cream); z-index:60;
    transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; box-shadow:-10px 0 40px rgba(0,0,0,.12);
  }
  .drawer.open{transform:translateX(0);}
  .drawer h2{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:18px; padding:22px 22px 14px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line);}
  .close{background:none; border:none; font-size:24px; cursor:pointer; color:var(--ink); line-height:1;}
  .items{flex:1; overflow-y:auto; padding:8px 22px;}
  .empty{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; color:var(--muted); font-size:14px; text-align:center; padding:60px 20px;}
  .ci{display:flex; gap:12px; padding:16px 0; border-bottom:1px solid var(--line);}
  .ci-thumb{width:48px; height:60px; flex:none; background:var(--mimosa-soft); border-radius:6px; display:flex; align-items:center; justify-content:center;}
  .ci-thumb svg{width:24px;height:24px;opacity:.5}
  .ci-info{flex:1; min-width:0;}
  .ci-name{font-size:14px; font-weight:700; line-height:1.4;}
  .ci-seller{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:11px; color:var(--muted);}
  .ci-bottom{display:flex; align-items:center; justify-content:space-between; margin-top:8px;}
  .qty{display:flex; align-items:center; gap:0; border:1px solid var(--line); border-radius:20px; overflow:hidden;}
  .qty button{width:28px; height:28px; border:none; background:var(--paper); cursor:pointer; font-size:15px; color:var(--ink);}
  .qty button:hover{background:var(--mimosa-soft);}
  .qty span{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; min-width:30px; text-align:center; font-size:13px;}
  .ci-price{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-weight:700; font-size:14px;}
  .remove{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;text-decoration:underline;margin-top:4px;}
  .foot{border-top:1px solid var(--line); padding:18px 22px 24px; background:var(--paper);}
  .row{display:flex; justify-content:space-between; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:13px; color:var(--muted); margin-bottom:6px;}
  .row.total{font-size:17px; color:var(--ink); font-weight:800; margin:10px 0 4px;}
  .note{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:11px; color:var(--muted); margin-bottom:14px;}
  .checkout{
    width:100%; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:15px; font-weight:700;
    background:var(--ink); color:#fff; border:none; padding:15px; border-radius:30px; cursor:pointer; transition:background .18s;
  }
  .checkout:hover{background:#2c3126;}
  .checkout:disabled{background:var(--line); color:var(--muted); cursor:not-allowed;}

  footer{border-top:1px solid var(--line); padding:30px 22px; text-align:center; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:12px; color:var(--muted);}

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; font-size:13px; padding:12px 22px; border-radius:30px; opacity:0; pointer-events:none; transition:all .25s; z-index:70;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media(max-width:860px){ .grid{grid-template-columns:repeat(2,1fr);} .hero h1{font-size:30px;} }
  @media(max-width:560px){ .grid{grid-template-columns:1fr;} .brand span{display:none;} }
</style>
</head>
<body>

<header>
  <div class="bar">
    <a class="brand" href="#">
      <img class="mark" src="favicon.png" alt="ミモザ堂"
           onerror="this.style.display='none'">
      <span class="brand-text"><b>ミモザ堂</b><span>MIMOSA DOU SHOP</span></span>
    </a>
    <button class="cart-btn" onclick="openCart()">
      カート <span class="cart-count" id="cc">0</span>
    </button>
  </div>
</header>

<section class="hero">
  <div class="eyebrow">COMMISSIONED BOOKS &amp; GOODS</div>
  <h1>つくり手の１冊を、あなたのもとへ。<span class="dots"><i></i><i></i><i></i><i></i><i></i><i></i></span></h1>
  <p>ミモザ堂がお預かりした書籍や雑貨を、編集者の目で選んでお届けします。気になる１冊をカートに入れて、そのままお会計へ。</p>
</section>

<div class="filter" id="filter">
  <span class="lbl">つくり手で絞る</span>
</div>

<main class="grid" id="grid"></main>

<footer>ミモザ堂（ミモザパートナーズ合同会社）　|　お問い合わせはLINE公式アカウントまで</footer>

<!-- cart -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<aside class="drawer" id="drawer" aria-label="カート">
  <h2>カート <button class="close" onclick="closeCart()">&times;</button></h2>
  <div class="items" id="items"></div>
  <div class="foot">
    <div class="row"><span>商品小計</span><span id="subtotal">¥0</span></div>
    <div class="row"><span>送料（まとめ発送）</span><span id="shipfee">—</span></div>
    <div class="row total"><span>合計（税込）</span><span id="total">¥0</span></div>
    <p class="note">送料は同梱発送を想定し、商品の中でもっとも高い配送方法を1回分として計算しています。お支払いは Square の安全な決済画面で行います。</p>
    <button class="checkout" id="checkout" onclick="checkout()" disabled>レジに進む</button>
  </div>
</aside>

<div class="toast" id="toast">カートに追加しました</div>

<script>
// ============================================================
// 商品データの取得元（第二段階）
//   ① GAS のウェブアプリ /exec の URL をここに貼ると、
//      スプレッドシートの商品マスタから自動で読み込みます。
//   ② 空のままだと、下の DEMO データで動きます（設定前の確認用）。
// ============================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbws-OekNnVWaaDKjOgpFqf06RgB4mgE__zDD7jE1X4I7BBGktCVxO2tXjRMghLGLjP-UA/exec"; // 例: https://script.google.com/macros/s/XXXX/exec

// フォールバック用デモ（GAS_URL 未設定時のみ使用）
const DEMO = [
  { id:"bk01", name:"朝の余白", cat:"エッセイ", seller:"白川 詩織", price:1500, stock:8, shipMethod:"クリックポスト", shipFee:200, image:"", squareUrl:"", desc:"日々の小さな間（ま）を見つめた、静かな随筆集。" },
  { id:"bk02", name:"港の光", cat:"写真集", seller:"白川 詩織", price:2200, stock:3, shipMethod:"クリックポスト", shipFee:200, image:"", squareUrl:"", desc:"瀬戸内の港町を巡って撮りためた、朝夕の光の記録。" },
  { id:"bk03", name:"小さな声", cat:"文庫", seller:"中村 和臣", price:1200, stock:12, shipMethod:"クリックポスト", shipFee:200, image:"", squareUrl:"", desc:"市井の人々の声を綴った掌編集。読み切り24編。" },
  { id:"gd01", name:"和綴じノート（藍）", cat:"文具", seller:"中村 和臣", price:1800, stock:5, shipMethod:"宅配便", shipFee:700, image:"", squareUrl:"", desc:"職人が一冊ずつ手で綴じた、藍染め表紙のノート。" },
  { id:"bk04", name:"庭とコーヒー", cat:"エッセイ", seller:"工房ことり", price:1600, stock:0, shipMethod:"クリックポスト", shipFee:200, image:"", squareUrl:"", desc:"庭づくりと一杯のコーヒーをめぐる12か月の記録。" },
  { id:"gd02", name:"活版しおり 5枚組", cat:"雑貨", seller:"工房ことり", price:900, stock:20, shipMethod:"ネコポス", shipFee:250, image:"", squareUrl:"", desc:"活版印刷で刷った、草花モチーフのしおりセット。" },
];

let PRODUCTS = [];

async function loadProducts(){
  const grid = document.getElementById("grid");
  grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;">商品を読み込んでいます…</div>`;
  if(!GAS_URL){
    PRODUCTS = DEMO;
    init();
    return;
  }
  try{
    const res = await fetch(GAS_URL);
    const data = await res.json();
    if(data.ok && Array.isArray(data.products)){
      PRODUCTS = data.products;
    }else{
      throw new Error(data.error || "形式が不正です");
    }
  }catch(err){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--muted);font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;">商品を読み込めませんでした。<br>時間をおいて再度お試しください。</div>`;
    return;
  }
  init();
}

function init(){
  buildFilter(); render(); updateCart();
}

const yen = n => "¥" + n.toLocaleString("ja-JP");
const bookSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="#5A6B3B" stroke-width="1.4"><path d="M4 4h13a2 2 0 012 2v14H6a2 2 0 01-2-2z"/><path d="M4 4a2 2 0 00-2 2v12a2 2 0 002 2"/></svg>`;

let cart = {}; // id -> qty
let activeSeller = "all";

// --- filter chips ---
function buildFilter(){
  const sellers = ["all", ...new Set(PRODUCTS.map(p=>p.seller))];
  const f = document.getElementById("filter");
  sellers.forEach(s=>{
    const b = document.createElement("button");
    b.className = "chip" + (s==="all"?" active":"");
    b.textContent = s==="all" ? "すべて" : s;
    b.onclick = ()=>{ activeSeller=s; document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active")); b.classList.add("active"); render(); };
    f.appendChild(b);
  });
}

// --- product grid ---
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const list = PRODUCTS.filter(p=> activeSeller==="all" || p.seller===activeSeller);
  list.forEach(p=>{
    const sold = p.stock<=0;
    const inCart = cart[p.id]||0;
    const card = document.createElement("article");
    card.className = "card" + (sold?" soldout":"");
    const thumbInner = p.image
      ? `<img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">`
      : bookSvg;
    card.innerHTML = `
      <div class="thumb">
        <span class="seller-tag">${p.seller}</span>
        ${thumbInner}
      </div>
      <div class="body">
        <div class="cat">${p.cat}</div>
        <div class="name">${p.name}</div>
        <div class="desc">${p.desc}</div>
        <div class="price-row">
          <div class="price">${yen(p.price)} <small>税込</small></div>
          <button class="add" ${sold?"disabled":""} onclick="add('${p.id}')">${sold?"完売":"カートに入れる"}</button>
        </div>
        <div class="stock">${sold?"ただいま在庫切れです":"残り "+(p.stock-inCart)+" 点 ・ 送料 "+yen(p.shipFee)+"（"+p.shipMethod+"）"}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function add(id){
  const p = PRODUCTS.find(x=>x.id===id);
  const cur = cart[id]||0;
  if(cur >= p.stock){ toast("在庫数の上限です"); return; }
  cart[id] = cur+1;
  updateCart(); render(); toast("カートに追加しました");
}
function setQty(id,delta){
  const p = PRODUCTS.find(x=>x.id===id);
  const next = (cart[id]||0)+delta;
  if(next<=0){ delete cart[id]; }
  else if(next>p.stock){ toast("在庫数の上限です"); return; }
  else { cart[id]=next; }
  updateCart(); render();
}
function removeItem(id){ delete cart[id]; updateCart(); render(); }

function cartArray(){ return Object.keys(cart).map(id=>({p:PRODUCTS.find(x=>x.id===id), q:cart[id]})); }
function subtotal(){ return cartArray().reduce((s,{p,q})=>s+p.price*q,0); }
// 送料：同一商品は1注文として、商品ごとの送料のうち最大額を採用（簡易・まとめ発送想定）
function shipping(){
  const arr = cartArray();
  if(arr.length===0) return 0;
  return Math.max(...arr.map(({p})=>p.shipFee||0));
}

function updateCart(){
  const arr = cartArray();
  const count = arr.reduce((s,{q})=>s+q,0);
  document.getElementById("cc").textContent = count;
  const items = document.getElementById("items");
  if(arr.length===0){
    items.innerHTML = `<div class="empty">カートは空です。<br>気になる一冊を選んでみてください。</div>`;
  }else{
    items.innerHTML = arr.map(({p,q})=>`
      <div class="ci">
        <div class="ci-thumb">${bookSvg}</div>
        <div class="ci-info">
          <div class="ci-name">${p.name}</div>
          <div class="ci-seller">${p.seller}・${p.cat}</div>
          <div class="ci-bottom">
            <div class="qty">
              <button onclick="setQty('${p.id}',-1)">−</button>
              <span>${q}</span>
              <button onclick="setQty('${p.id}',1)">＋</button>
            </div>
            <div class="ci-price">${yen(p.price*q)}</div>
          </div>
          <button class="remove" onclick="removeItem('${p.id}')">削除</button>
        </div>
      </div>`).join("");
  }
  const st = subtotal();
  const sh = shipping();
  document.getElementById("subtotal").textContent = yen(st);
  document.getElementById("shipfee").textContent = arr.length ? yen(sh) : "—";
  document.getElementById("total").textContent = yen(st + sh);
  document.getElementById("checkout").disabled = arr.length===0;
}

function openCart(){ document.getElementById("overlay").classList.add("open"); document.getElementById("drawer").classList.add("open"); }
function closeCart(){ document.getElementById("overlay").classList.remove("open"); document.getElementById("drawer").classList.remove("open"); }

let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}

// --- checkout ---
// カートの中身を GAS に送り、Square のお会計URLを受け取って遷移する。
async function checkout(){
  const arr = cartArray();
  if(arr.length===0) return;

  const btn = document.getElementById("checkout");

  // GAS未設定（デモ）時は内容を表示するだけ
  if(!GAS_URL){
    const lines = arr.map(({p,q})=>`・${p.name}（${p.seller}） × ${q} … ${yen(p.price*q)}`).join("\n");
    alert(
      "【ご注文内容（デモ）】\n\n" + lines +
      "\n\n商品小計：" + yen(subtotal()) +
      "\n送料：" + yen(shipping()) +
      "\n合計：" + yen(subtotal()+shipping()) +
      "\n\n※ GAS_URL を設定すると、ここから Square のお会計へ進みます。"
    );
    return;
  }

  btn.disabled = true;
  btn.textContent = "お会計を準備しています…";
  try{
    const res = await fetch(GAS_URL, {
      method: "POST",
      // GASのdoPostはCORSプリフライトを避けるため text/plain で受ける
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        items: arr.map(({p,q})=>({ id:p.id, name:p.name, price:p.price, qty:q })),
        shippingFee: shipping()
      })
    });
    const data = await res.json();
    if(data.ok && data.url){
      window.location.href = data.url;   // Squareのお会計へ
    }else{
      alert("お会計に進めませんでした。\n" + (data.error || "時間をおいて再度お試しください。"));
      btn.disabled = false; btn.textContent = "レジに進む";
    }
  }catch(err){
    alert("通信エラーが発生しました。時間をおいて再度お試しください。");
    btn.disabled = false; btn.textContent = "レジに進む";
  }
}

loadProducts();
</script>
